name: Version Bump Bot

# Se activa cuando alguien comenta /bump patch|minor|major en un PR
on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/bump ')
    runs-on: ubuntu-latest

    steps:
      - name: Parse bump type
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          BUMP_TYPE=$(echo "$COMMENT" | grep -oP '(?<=/bump )(patch|minor|major)')
          if [ -z "$BUMP_TYPE" ]; then
            echo "::error::Tipo de bump no valido. Usa: /bump patch|minor|major"
            exit 1
          fi
          echo "type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

      - name: Check author permissions
        uses: actions/github-script@v7
        with:
          script: |
            const { data: perm } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(perm.permission)) {
              core.setFailed('Solo colaboradores con permisos de escritura pueden hacer bump');
            }

      - name: Get PR branch
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch }}
          fetch-depth: 0

      - name: Run bump script
        id: bump
        run: |
          bash scripts/bump-version.sh ${{ steps.parse.outputs.type }}
          NEW_VERSION=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "mimir-bot"
          git config user.email "mimir-bot@users.noreply.github.com"
          git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml daemon/pyproject.toml daemon/mimir_daemon/__init__.py
          git commit -m "chore: bump version to v${{ steps.bump.outputs.version }}"
          git push

      - name: React to comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Version bumped to **v${{ steps.bump.outputs.version }}** (${{ steps.parse.outputs.type }}) :rocket:`,
            });
